  <text x="60" y="112" fill="#9DBBD6" font-size="13" letter-spacing="3">PERSONAL AI WORKSPACE · ~/Work</text>
  <line x1="60" y1="128" x2="700" y2="128" stroke="#CFE4F5" stroke-width="1.5"/>
  <text x="940" y="86" fill="#7FD1F0" font-size="12" letter-spacing="2" text-anchor="end">DWG HARNESS-001</text>
  <text x="940" y="104" fill="#9DBBD6" font-size="11" letter-spacing="2" text-anchor="end">REV O · SHEET 1 OF 2</text>

  <!-- ============ L5 THINKING ============ -->
  <text x="60" y="176" fill="#7FD1F0" font-size="11" letter-spacing="3">L5 — THINKING</text>
  <rect x="60" y="188" width="620" height="88" fill="#1B3E5F" stroke="#7FD1F0" stroke-width="2"/>
  <text x="84" y="224" fill="#E8F2FB" font-size="17" font-weight="700" letter-spacing="1">YOU  +  FRONTIER MODEL SESSION</text>
  <text x="84" y="250" fill="#9DBBD6" font-size="12">judgment · architecture · hard debugging · tight context</text>
  <text x="700" y="238" fill="#7FD1F0" font-size="11">EXPENSIVE / RARE</text>

