  <text x="60" y="352" fill="#7FD1F0" font-size="11" letter-spacing="3">L4 — WORKERS · SIX AGENTS (.agent.md)</text>
  <rect x="60" y="364" width="880" height="196" fill="none" stroke="#CFE4F5" stroke-width="1.5" stroke-dasharray="6 4"/>

  <g>
    <rect x="80" y="386" width="188" height="66" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="94" y="412" fill="#E8F2FB" font-size="13" font-weight="700">ticket-scribe</text>
    <text x="94" y="432" fill="#9DBBD6" font-size="10.5">session log + state</text>

    <rect x="290" y="386" width="188" height="66" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="304" y="412" fill="#E8F2FB" font-size="13" font-weight="700">check-scribe</text>
    <text x="304" y="432" fill="#9DBBD6" font-size="10.5">checks → notebook*</text>

    <rect x="500" y="386" width="188" height="66" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="514" y="412" fill="#E8F2FB" font-size="13" font-weight="700">doc-writer</text>
    <text x="514" y="432" fill="#9DBBD6" font-size="10.5">PRs · READMEs</text>

    <rect x="710" y="386" width="188" height="66" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="724" y="412" fill="#E8F2FB" font-size="13" font-weight="700">knowledge-keeper</text>
    <text x="724" y="432" fill="#9DBBD6" font-size="10.5">capture learnings</text>
  </g>
  <text x="80" y="478" fill="#9DBBD6" font-size="10.5" letter-spacing="1">CHEAP TIER · NOT USER-INVOCABLE (except doc-writer) · EVERY SESSION</text>

  <rect x="80" y="494" width="500" height="50" fill="#1B3E5F" stroke="#7FD1F0" stroke-width="2"/>
  <text x="96" y="516" fill="#E8F2FB" font-size="13" font-weight="700">knowledge-curator</text>
  <text x="96" y="534" fill="#9DBBD6" font-size="10.5">compact + promote (with approval) · SONNET TIER · DIRECT INVOKE ONLY · RARE</text>
  <rect x="620" y="494" width="300" height="50" fill="#1B3E5F" stroke="#7FD1F0" stroke-width="2"/>
  <text x="636" y="516" fill="#E8F2FB" font-size="13" font-weight="700">ticket-init</text>
  <text x="636" y="534" fill="#9DBBD6" font-size="10.5">interactive kickoff · SONNET · DIRECT · at pickup</text>
  <text x="84" y="557" fill="#9DBBD6" font-size="10.5">*via append_notebook_cell.py</text>

