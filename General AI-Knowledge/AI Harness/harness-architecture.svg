  <rect x="1080" y="180" width="780" height="300" fill="none" stroke="#7FD1F0" stroke-width="1.5" stroke-dasharray="6 4"></rect>
  <text x="1100" y="212" fill="#E8F2FB" font-size="13" font-weight="700">make_context_pack.sh</text>
  <text x="1100" y="232" fill="#9DBBD6" font-size="11">scrub table → zip + manifest → Desktop (disposable) → external review</text>
  <text x="1100" y="268" fill="#E8F2FB" font-size="13" font-weight="700">harness-status.sh</text>
  <text x="1100" y="288" fill="#9DBBD6" font-size="11">estate report: last-session + AI-Knowledge counts · naming/size/commit-lag WARNs</text>
  <text x="1100" y="304" fill="#9DBBD6" font-size="11">stale GAK · git/hook/agent liveness</text>
  <text x="1100" y="340" fill="#E8F2FB" font-size="13" font-weight="700">harness-housekeeping.sh</text>
  <text x="1100" y="360" fill="#9DBBD6" font-size="11">git gc + repack + size report · HUMAN-RUN · monthly or when status WARNs .git is large</text>
  <text x="1100" y="376" fill="#9DBBD6" font-size="11">touches no records</text>
  <text x="1100" y="414" fill="#7FD1F0" font-size="11">status observes · failures prescribe · nothing heals itself</text>
  <text x="1100" y="432" fill="#7FD1F0" font-size="11">manual skim before a pack leaves the machine</text>

  <text x="1080" y="528" fill="#7FD1F0" font-size="11" letter-spacing="2">SHARED RECOGNITION + PORTABILITY · ONE HOME EACH · SOURCED, NEVER COPIED</text>
  <rect x="1080" y="540" width="780" height="300" fill="none" stroke="#7FD1F0" stroke-width="1.5"></rect>
  <rect x="1100" y="560" width="740" height="84" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"></rect>
  <text x="1116" y="586" fill="#E8F2FB" font-size="13" font-weight="700">ticket-grammar.sh</text>
  <text x="1116" y="606" fill="#9DBBD6" font-size="11">TICKET_RE + ticket predicates — what counts as a ticket</text>
  <text x="1116" y="622" fill="#9DBBD6" font-size="11">edit here to retarget your board; both readers follow</text>
  <rect x="1100" y="664" width="740" height="84" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"></rect>
  <text x="1116" y="690" fill="#E8F2FB" font-size="13" font-weight="700">portability.sh</text>
  <text x="1116" y="710" fill="#9DBBD6" font-size="11">GNU/BSD shims — ts14 → epoch, and friends</text>
  <text x="1116" y="726" fill="#9DBBD6" font-size="11">one conversion home; GNU and BSD read alike</text>
  <text x="1100" y="780" fill="#F5B84A" font-size="11">the validator (L2) and harness-status (M) both SOURCE these —</text>
  <text x="1100" y="798" fill="#F5B84A" font-size="11">no private copy, so their view of the estate can&#39;t drift</text>

  <rect x="1080" y="880" width="780" height="80" fill="none" stroke="#CFE4F5" stroke-width="1" stroke-dasharray="4 3"></rect>
  <text x="1100" y="906" fill="#E8F2FB" font-size="11.5" font-weight="700">HOW TO READ</text>
  <text x="1100" y="928" fill="#9DBBD6" font-size="11">the left stack is the chain of command, top-down;</text>
  <text x="1100" y="944" fill="#9DBBD6" font-size="11">these right panels sit beside it — sourced or invoked on demand</text>

  <text x="1080" y="1006" fill="#7FD1F0" font-size="11" letter-spacing="3">THE PATTERN — REPEATED AT EVERY LAYER</text>
