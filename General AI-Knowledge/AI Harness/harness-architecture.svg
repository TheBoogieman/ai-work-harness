<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1544" viewBox="0 0 1000 1544" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1E4568" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#3D6A94" stroke-width="1.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#CFE4F5"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5B84A"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7FD1F0"/>
    </marker>
  </defs>

  <!-- paper -->
  <rect width="1000" height="1544" fill="#14324E"/>
  <rect width="1000" height="1544" fill="url(#grid)"/>
  <rect x="18" y="18" width="964" height="1508" fill="none" stroke="#CFE4F5" stroke-width="2"/>
  <rect x="26" y="26" width="948" height="1492" fill="none" stroke="#3D6A94" stroke-width="1"/>

