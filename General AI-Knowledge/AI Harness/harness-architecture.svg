  <rect x="80" y="648" width="460" height="78" fill="#1B3E5F" stroke="#7FD1F0" stroke-width="2"></rect>
  <text x="96" y="674" fill="#E8F2FB" font-size="14" font-weight="700">folder-structure.md</text>
  <text x="96" y="694" fill="#9DBBD6" font-size="11">THE CONSTITUTION — every rule lives here</text>
  <text x="96" y="710" fill="#9DBBD6" font-size="11">conventions · atomicity · context budget</text>
  <rect x="560" y="648" width="460" height="78" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"></rect>
  <text x="576" y="674" fill="#E8F2FB" font-size="14" font-weight="700">Tickets/&lt;ID&gt;/</text>
  <text x="576" y="694" fill="#9DBBD6" font-size="11">&lt;ID&gt;.md → Current State + Session Log</text>
  <text x="576" y="710" fill="#9DBBD6" font-size="11">AI-Knowledge/ + _index.md · Checks/ · Logs/ · Dump/</text>
  <rect x="80" y="760" width="460" height="78" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"></rect>
