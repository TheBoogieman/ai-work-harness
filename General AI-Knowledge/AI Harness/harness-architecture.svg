  <rect x="60" y="1084" width="980" height="74" fill="#14324E" opacity="0.55"></rect>
  <text x="84" y="1108" fill="#E8F2FB" font-size="13.5" font-weight="700">L1 — SAFETY NET · git — LOCAL ONLY, rooted at Work/, WHITELIST-scoped</text>
  <text x="84" y="1129" fill="#9DBBD6" font-size="11">every write commits · NO REMOTE, EVER · records only: tickets(−Logs/Dump) · constitution · AGENTS.md · _agents · _harness · GAK</text>
