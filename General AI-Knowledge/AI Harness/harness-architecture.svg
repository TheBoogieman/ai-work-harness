  <text x="60" y="940" fill="#F5B84A" font-size="11" letter-spacing="3">L2 — ENFORCEMENT · DUMB INSPECTOR (NO AI)</text>
  <rect x="60" y="952" width="980" height="104" fill="#1B3E5F" stroke="#F5B84A" stroke-width="2"></rect>
  <text x="84" y="976" fill="#E8F2FB" font-size="13.5" font-weight="700">hooks: postToolUse → commit · sessionStart → validate · sessionEnd = bonus</text>
  <text x="84" y="995" fill="#F5B84A" font-size="11">· commit hooks act in a KEYED estate only</text>
  <text x="84" y="1013" fill="#9DBBD6" font-size="11.5">FAILS: missing log entry · missing Current State · index orphans/ghosts</text>
  <text x="84" y="1030" fill="#9DBBD6" font-size="11.5">NAGS: index &gt; 10 files → run curator · 3+ sessions with empty AI-Knowledge</text>
  <text x="84" y="1048" fill="#F5B84A" font-size="11">checks facts only — never judges content · no ticket touched = vacuous pass</text>

  <line x1="550" y1="1056" x2="550" y2="1080" stroke="#CFE4F5" stroke-width="2" marker-end="url(#arrow)"></line>
  <text x="566" y="1072" fill="#CFE4F5" font-size="11" letter-spacing="1">EVERY WRITE AUTO-COMMITS — KEYED ESTATE ONLY</text>

