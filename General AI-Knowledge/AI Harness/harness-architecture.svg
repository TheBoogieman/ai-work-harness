  <text x="96" y="806" fill="#9DBBD6" font-size="11">durable, ticket-free knowledge · one topic/folder</text>
  <text x="96" y="822" fill="#9DBBD6" font-size="11">&#34;Last reviewed:&#34; dated · incl. this drawing</text>
  <rect x="560" y="760" width="460" height="78" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"></rect>
  <text x="576" y="786" fill="#E8F2FB" font-size="14" font-weight="700">AGENTS.md</text>
