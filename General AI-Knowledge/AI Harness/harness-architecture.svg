  <rect x="60" y="646" width="880" height="240" fill="none" stroke="#CFE4F5" stroke-width="1.5"/>

  <rect x="80" y="668" width="400" height="88" fill="#1B3E5F" stroke="#7FD1F0" stroke-width="2"/>
  <text x="96" y="694" fill="#E8F2FB" font-size="14" font-weight="700">folder-structure.md</text>
