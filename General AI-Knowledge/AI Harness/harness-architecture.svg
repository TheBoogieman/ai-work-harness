  <text x="96" y="732" fill="#9DBBD6" font-size="11">conventions · atomicity · context budget</text>

  <rect x="500" y="668" width="400" height="88" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
  <text x="516" y="694" fill="#E8F2FB" font-size="14" font-weight="700">Tickets/&lt;ID&gt;/</text>
  <text x="516" y="714" fill="#9DBBD6" font-size="11">&lt;ID&gt;.md → Current State + Session Log</text>
  <text x="516" y="732" fill="#9DBBD6" font-size="11">AI-Knowledge/ + _index.md · Checks/ · Logs/ · Dump/</text>

  <rect x="80" y="774" width="400" height="88" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
  <text x="96" y="800" fill="#E8F2FB" font-size="14" font-weight="700">General AI-Knowledge/</text>
  <text x="96" y="820" fill="#9DBBD6" font-size="11">durable, ticket-free knowledge · one topic/folder</text>
  <text x="96" y="838" fill="#9DBBD6" font-size="11">"Last reviewed:" dated · incl. this drawing</text>

  <rect x="500" y="774" width="400" height="88" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
  <text x="516" y="800" fill="#E8F2FB" font-size="14" font-weight="700">AGENTS.md</text>
  <text x="516" y="820" fill="#9DBBD6" font-size="11">THE LOADER — 10-line contract Copilot reads</text>
  <text x="516" y="838" fill="#9DBBD6" font-size="11">on every surface → points at the constitution</text>

  <!-- promotion arrow -->
  <path d="M500 748 H490 V765 H304 V770" fill="none" stroke="#7FD1F0" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowCyan)"/>
  <text x="512" y="769" fill="#7FD1F0" font-size="10.5">&#9664; curator promotes (approved)</text>

  <!-- enforcement arrow -->
  <line x1="500" y1="886" x2="500" y2="938" stroke="#F5B84A" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="514" y="918" fill="#F5B84A" font-size="11" letter-spacing="1">VALIDATED ON ENTRY</text>

  <!-- ============ L2 ENFORCEMENT ============ -->
  <text x="60" y="960" fill="#F5B84A" font-size="11" letter-spacing="3">L2 — ENFORCEMENT · DUMB INSPECTOR (NO AI)</text>
  <rect x="60" y="972" width="880" height="118" fill="#1B3E5F" stroke="#F5B84A" stroke-width="2"/>
  <text x="84" y="1002" fill="#E8F2FB" font-size="14" font-weight="700">hooks: postToolUse → commit · sessionStart → validate · sessionEnd = bonus</text>
  <text x="84" y="1028" fill="#9DBBD6" font-size="11.5">FAILS: missing log entry · missing Current State · index orphans/ghosts</text>
  <text x="84" y="1048" fill="#9DBBD6" font-size="11.5">NAGS: index &gt; 10 files → run curator · 3+ sessions with empty AI-Knowledge</text>
  <text x="84" y="1072" fill="#F5B84A" font-size="11">checks facts only — never judges content · no ticket touched = vacuous pass</text>

  <!-- commit arrow -->
  <line x1="500" y1="1090" x2="500" y2="1140" stroke="#CFE4F5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="514" y="1122" fill="#CFE4F5" font-size="11" letter-spacing="1">EVERY WRITE AUTO-COMMITS</text>

  <!-- ============ L1 SAFETY NET ============ -->
  <text x="60" y="1162" fill="#7FD1F0" font-size="11" letter-spacing="3">L1 — SAFETY NET</text>
  <rect x="60" y="1174" width="880" height="74" fill="url(#hatch)" stroke="#CFE4F5" stroke-width="2"/>
  <rect x="60" y="1174" width="880" height="74" fill="#14324E" opacity="0.55"/>
  <text x="84" y="1204" fill="#E8F2FB" font-size="14" font-weight="700">git — LOCAL ONLY, rooted at Work/, WHITELIST-scoped</text>
  <text x="84" y="1228" fill="#9DBBD6" font-size="11.5">every write commits · NO REMOTE, EVER · records only: tickets(−Logs/Dump) · constitution · AGENTS.md · _agents · _harness · GAK — nothing else enters</text>

  <!-- ============ M MAINTENANCE PORT ============ -->
  <text x="60" y="1280" fill="#7FD1F0" font-size="11" letter-spacing="3">M — MAINTENANCE PORT · OFFLINE, ON DEMAND</text>
  <rect x="60" y="1292" width="880" height="84" fill="none" stroke="#7FD1F0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="84" y="1316" fill="#E8F2FB" font-size="13" font-weight="700">make_context_pack.sh  →  scrub table  →  zip + manifest → Desktop (disposable) → external review</text>
  <text x="84" y="1338" fill="#E8F2FB" font-size="13" font-weight="700">harness-status.sh  →  estate report: ticket ages · index nags · stale GAK · git/hook/agent liveness</text>
  <text x="84" y="1360" fill="#9DBBD6" font-size="11">status observes · failures prescribe · nothing heals itself · manual skim before a pack leaves the machine</text>

  <!-- ============ THE PATTERN ============ -->
  <line x1="60" y1="1398" x2="940" y2="1398" stroke="#3D6A94" stroke-width="1"/>
  <text x="60" y="1424" fill="#7FD1F0" font-size="11" letter-spacing="3">THE PATTERN — REPEATED AT EVERY LAYER</text>
  <g font-size="12.5" font-weight="700" fill="#E8F2FB">
    <rect x="60" y="1436" width="170" height="40" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="145" y="1461" text-anchor="middle">FILE = RULE</text>
    <rect x="290" y="1436" width="170" height="40" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="375" y="1461" text-anchor="middle">AGENT = WORK</text>
    <rect x="520" y="1436" width="170" height="40" fill="#1B3E5F" stroke="#F5B84A" stroke-width="1.5"/>
    <text x="605" y="1461" text-anchor="middle">HOOK = CATCH</text>
    <rect x="750" y="1436" width="170" height="40" fill="#1B3E5F" stroke="#CFE4F5" stroke-width="1.5"/>
    <text x="835" y="1461" text-anchor="middle">GIT = UNDO</text>
  </g>
  <g stroke="#CFE4F5" stroke-width="1.5">
    <line x1="230" y1="1456" x2="286" y2="1456" marker-end="url(#arrow)"/>
    <line x1="460" y1="1456" x2="516" y2="1456" marker-end="url(#arrow)"/>
    <line x1="690" y1="1456" x2="746" y2="1456" marker-end="url(#arrow)"/>
  </g>

  <!-- title block -->
  <g font-size="10" fill="#9DBBD6" letter-spacing="1">
    <line x1="60" y1="1490" x2="940" y2="1490" stroke="#3D6A94" stroke-width="1"/>
    <text x="60" y="1508">PROJECT: AI HARNESS v2</text>
    <text x="330" y="1508">DRAWN: THE HARNESS PROJECT</text>
    <text x="600" y="1508">CLIENT: YOU</text>
    <text x="940" y="1508" text-anchor="end">SCALE: NTS · 2026-07</text>
