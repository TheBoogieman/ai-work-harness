  <text x="576" y="822" fill="#9DBBD6" font-size="11">on every surface → points at the constitution</text>
  <path d="M620 726 V744 H360 V754" fill="none" stroke="#7FD1F0" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowCyan)"></path>
  <text x="390" y="739" fill="#7FD1F0" font-size="10">curator promotes (approved)</text>
  <text x="96" y="858" fill="#9DBBD6" font-size="10.5">Tickets/ markers — init writes .ticket-pending; you write .not-a-ticket</text>
  <text x="96" y="874" fill="#9DBBD6" font-size="10.5">.not-a-ticket → silence a non-ticket · .ticket-pending → non-silenceable, nags until renamed AND marker removed</text>

